name: Docs Deploy

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7

      - name: Build docs
        run: uv run --group docs sphinx-build docs docs/_build/html -b html -W

  docs-publish:
    name: Publish documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.preview_url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
      - uses: astral-sh/setup-uv@v7

      - name: Build docs
        run: uv run --group docs sphinx-build docs docs/_build/html -b html -W

      - name: Stage documentation artifact
        run: |
          out_dir="site"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cp -a docs/_build/html/. "$out_dir/"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Compute documentation URL
        id: preview_url
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Summarize documentation URL
        run: |
          echo "Documentation published at: ${{ steps.preview_url.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

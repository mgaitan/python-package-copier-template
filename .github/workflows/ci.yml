name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      generated_docs: ${{ steps.filter.outputs.generated_docs }}
      python: ${{ steps.filter.outputs.python }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
            generated_docs:
              - 'project/docs/**'
              - 'project/README.md.jinja'
              - 'project/CONTRIBUTING.md.jinja'
              - 'project/CODE_OF_CONDUCT.md.jinja'
            python:
              - 'copier.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'python_package_copier_template/**'
              - 'tests/**'
              - 'project/**/*.jinja'
            workflows:
              - '.github/workflows/**'
              - 'project/.github/workflows/**'

  workflows-lint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint GitHub workflows
        uses: rhysd/actionlint@v1.7.12

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Template package docs
        run: uv run --group docs sphinx-build docs docs/_build/html -b html -W

  template-smoke:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Copier Bot"
          git config --global user.email "bot@example.com"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install prek tool
        run: |
          uv tool install prek
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Generate project from template
        run: uv run copier copy --trust --vcs-ref=HEAD . test-project --defaults

      - name: Initialize Git for prek smoke
        working-directory: test-project
        run: |
          git init
          git add -A

      - name: Template prek check
        working-directory: test-project
        run: prek run --all-files

      - name: Template Ruff check
        working-directory: test-project
        run: uv run --only-group lint ruff check --output-format=github

      - name: Template Ruff format
        working-directory: test-project
        run: uv run --only-group lint ruff format --check

      - name: Template Ty check
        working-directory: test-project
        run: uv run --group qa ty check --output-format=github

      - name: Template tests
        working-directory: test-project
        run: uv run --group test pytest

      - name: Template build
        working-directory: test-project
        run: uv build

      - name: Template docs
        working-directory: test-project
        run: make docs

  generated-docs:
    needs: changes
    if: needs.changes.outputs.generated_docs == 'true' && needs.changes.outputs.python != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.name "Copier Bot"
          git config --global user.email "bot@example.com"
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Generate project from template
        run: uv run copier copy --trust --vcs-ref=HEAD . test-project --defaults
      - name: Template docs
        working-directory: test-project
        run: make docs
